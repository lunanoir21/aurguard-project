name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: fmt + clippy + test + docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      # The lint gate is scoped to our own crate via clippy. We intentionally do
      # NOT set a global `RUSTFLAGS: -D warnings`, which would also fail on
      # warnings emitted by dependency crates after a toolchain bump.
      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --all-targets --locked

      - name: Test
        run: cargo test --all --locked

      - name: Docs (deny broken links)
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --document-private-items

  msrv:
    name: MSRV (1.86)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Honors the `rust-version = "1.86"` pledge in Cargo.toml. 1.86 is the
      # real floor: the dependency tree (edition-2024 crates, icu) needs it.
      - name: Install Rust 1.86
        uses: dtolnay/rust-toolchain@1.86.0

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build on MSRV
        run: cargo build --locked
