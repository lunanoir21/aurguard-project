name: Release

on:
  push:
    tags: ["v*"]

# Default: read-only. Jobs that need more request it explicitly.
permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # upload release assets
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross linker (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          printf '[target.aarch64-unknown-linux-gnu]\nlinker = "aarch64-linux-gnu-gcc"\n' >> .cargo/config.toml

      - name: Build
        env:
          # The `cc` crate needs the cross C compiler to build the
          # tree-sitter-bash grammar for aarch64.
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            aarch64-linux-gnu-strip target/${{ matrix.target }}/release/aurguard || true
          else
            strip target/${{ matrix.target }}/release/aurguard || true
          fi

      - name: Package
        run: |
          tar -C target/${{ matrix.target }}/release -czf \
            aurguard-${{ matrix.target }}.tar.gz aurguard

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: aurguard-${{ matrix.target }}.tar.gz

  publish-crate:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Sync crate version to tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Releasing $VERSION"
          sed -i -E "0,/^version = \".*\"/s//version = \"$VERSION\"/" Cargo.toml

      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "CARGO_REGISTRY_TOKEN not set — skipping crates.io publish."
            exit 0
          fi
          cargo publish --allow-dirty

  publish-npm:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance (supply-chain attestation)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Download release binaries into the platform packages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          dl() { # <triple> <platform-dir>
            gh release download "v$VERSION" -p "aurguard-$1.tar.gz" -O "/tmp/$1.tgz" -R "$GITHUB_REPOSITORY"
            mkdir -p "npm/platforms/$2/bin"
            tar -xzf "/tmp/$1.tgz" -C "npm/platforms/$2/bin" aurguard
            chmod +x "npm/platforms/$2/bin/aurguard"
          }
          dl x86_64-unknown-linux-gnu  linux-x64
          dl aarch64-unknown-linux-gnu linux-arm64

      - name: Sync all package versions to tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for dir in npm npm/platforms/linux-x64 npm/platforms/linux-arm64; do
            ( cd "$dir" && npm version "$VERSION" --no-git-tag-version --allow-same-version )
          done

      - name: Publish (platform packages first, then the launcher)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN secret not set — skipping npm publish."
            exit 0
          fi
          # The launcher's optionalDependencies must already exist on the
          # registry, so publish the binary packages before the main one.
          ( cd npm/platforms/linux-x64  && npm publish --access public --provenance )
          ( cd npm/platforms/linux-arm64 && npm publish --access public --provenance )
          ( cd npm                       && npm publish --access public --provenance )
